name: Deploy to Deno Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'deno/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deploy
        uses: denoland/deployctl@v1
        with:
          project: home-todo-api
          entrypoint: deno/main.ts
